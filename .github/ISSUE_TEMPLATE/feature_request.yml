name: 功能建議 (Feature request)
description: 為 BigGo 購物幫手提出想法或改進 / Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 這解決了什麼問題？ / What problem does this solve?
      description: 描述使用情境或痛點。 / Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建議的解法 / Proposed solution
      description: 你希望看到什麼樣的結果？ / What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方案 / Alternatives considered
    validations:
      required: false
  - type: input
    id: region
    attributes:
      label: 相關地區／站台（選填）/ Relevant region / site (optional)
      description: 有些功能與地區或站台有關，這適用於哪個市場？ / Some features are region- or site-specific. Which market?
    validations:
      required: false
