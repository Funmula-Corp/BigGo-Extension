<div id="head" class="d-flex justify-content-between align-items-center" style="padding: 10px 10px 10px 20px">
  <img src="@IMG_images/btn_biggo_icon@2x.png@" height="24">
  <div id="title" style="font-size: 15px; font-weight: 500;">
    &nbsp;
  </div>

  <div class="d-flex align-items-center" style="gap: 2px">
    <img id="setting" class="close" src="@IMG_pages/popmenu/images/popup_setting.png@" height="36">
    <img id="close" class="close" src="@IMG_pages/popmenu/images/popup_close.png@" height="36">
  </div>
</div>

<div id="checkout-done-tip" style="margin-bottom: 16px; padding: 0 10px 0 20px">
  %idle_restart%
</div>

<div style="padding: 0 15px;">
  <div id="cashback-btn" class="btn btn-unactive">
    &nbsp;
  </div>
</div>

<div id="adtip" style="font-size: 14px; color: #8c9aa3; max-width: 500px; padding: 0 15px; justify-content: center; width: 100%; margin-top: 10px; display: none; text-align: center;">
  * %adblock_tip%
</div>

<div id="get-more" class="d-flex justify-content-end" style="font-size: 14px; color: #8c9aa3; cursor: pointer; margin-top: 10px; padding: 0 15px;">
  <span class="font-tip hover-underline">%cashback_detail%</span>
  <div style="width: 8px; height: 8px; border-bottom: 2px solid #8c9aa3; border-left: 2px solid #8c9aa3; margin-left: 2px;transform: rotate(225deg);margin-top: 5px;">&nbsp;</div>
</div>
